<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SidBar Menu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="wrapper">

        <input type="checkbox" id="btn">

        <label for="btn" class="menu-btn">
            <i class="fas fa-bars"></i>
        </label>

        <nav id="sidebar">
            <div class="title">Side Menu</div>

            <ul class="list-items">
                <li><a href="#"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="#"><i class="fas fa-user"></i> Cliente</a></li>
                <li><a href="#"><i class="fas fa-cogs"></i> Services</a></li>
                <li><a href="#"><i class="fas fa-sliders-h"></i> Settings</a></li>
                <li><a href="#"><i class="fas fa-star"></i> Features</a></li>
                <li><a href="#"><i class="fas fa-info-circle"></i> About Us</a></li>
                <li><a href="#"><i class="fas fa-language"></i> Languages</a></li>
                <li><a href="#"><i class="fas fa-envelope"></i> Contact Us</a></li>
            </ul>

            <div class="icons">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-youtube"></i></a>
            </div>
        </nav>

    </div>
</body>
</html>
